<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nothing Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top bar: app actions -->
  <div id="top-controls">
    <button id="menu-toggle" data-i18n-title="menu" title="Toggle Sidebar">☰</button>
    <button id="new-btn" data-i18n-title="newNote" title="New note">+</button>
    <button id="capture-btn" data-i18n-title="capture" title="Capture & Download (PNG)">
      <span class="dot"></span> <span data-i18n="captureLabel">Capture</span>
    </button>
  </div>

  <!-- Ribbon toolbar: Word-style, grouped sections -->
  <div id="ribbon">

    <div class="ribbon-group">
      <span class="group-label" data-i18n="groupText">Text</span>
      <div class="group-row">
        <button class="icon-btn" data-action="bold" data-i18n-title="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button class="icon-btn" data-action="italic" data-i18n-title="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button class="icon-btn" data-action="underline" data-i18n-title="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <button class="icon-btn" data-action="strike" data-i18n-title="strike" title="Strikethrough (Ctrl+Shift+S)"><s>S</s></button>
        <button class="icon-btn" data-action="code" data-i18n-title="code" title="Inline code (Ctrl+E)">&lt;/&gt;</button>
        <button class="icon-btn" data-action="highlight" data-i18n-title="highlight" title="Highlight selection">
          <mark style="background-color: rgba(234,21,21,0.3); color: inherit; padding:0 4px; border-radius:4px;">H</mark>
        </button>
      </div>
    </div>

    <div class="ribbon-sep"></div>

    <div class="ribbon-group">
      <span class="group-label" data-i18n="groupColors">Colors</span>
      <div class="group-row">
        <label class="color-label">
          <input type="color" id="underline-color" class="color-input" value="#ea1515">
          <span data-i18n="underlineColor">Underline</span>
        </label>
        <label class="color-label">
          <input type="color" id="highlight-color" class="color-input" value="#ea1515">
          <span data-i18n="highlightColor">Highlight</span>
        </label>
        <label class="color-label">
          <input type="color" id="quote-color-input" class="color-input" value="#ea1515">
          <span data-i18n="quoteColor">Quote</span>
        </label>
      </div>
    </div>

    <div class="ribbon-sep"></div>

    <div class="ribbon-group">
      <span class="group-label" data-i18n="groupStructure">Structure</span>
      <div class="group-row">
        <button class="icon-btn" data-action="h1" data-i18n-title="h1" title="Heading 1 (Ctrl+Shift+1 or '# ')">H1</button>
        <button class="icon-btn" data-action="h2" data-i18n-title="h2" title="Heading 2 (Ctrl+Shift+2 or '## ')">H2</button>
        <button class="icon-btn" data-action="h3" data-i18n-title="h3" title="Heading 3 (Ctrl+Shift+3 or '### ')">H3</button>
        <button class="icon-btn" data-action="blockquote" data-i18n-title="quote" title="Quote (Ctrl+Shift+9 or '> ')">&ldquo;</button>
        <button class="icon-btn" data-action="ul" data-i18n-title="ul" title="Bullet list (Ctrl+Shift+8 or '- ')">&bull;</button>
        <button class="icon-btn" data-action="ol" data-i18n-title="ol" title="Numbered list (Ctrl+Shift+7 or '1. ')">1.</button>
        <button class="icon-btn" data-action="pre" data-i18n-title="pre" title="Code block (or '```' + Enter)">{ }</button>
        <button class="icon-btn" data-action="hr" data-i18n-title="divider" title="Divider (or '---' + Enter)">&mdash;</button>
      </div>
    </div>

    <div class="ribbon-sep"></div>

    <div class="ribbon-group">
      <span class="group-label" data-i18n="groupFontSize">Font Size</span>
      <div class="group-row">
        <button class="icon-btn" id="font-size-dec" title="Decrease font size">A-</button>
        <input type="number" id="font-size-display" class="font-size-input" value="22" min="10" max="72" step="2">
        <button class="icon-btn" id="font-size-inc" title="Increase font size">A+</button>
      </div>
    </div>

  </div>

  <!-- Sidebar: settings -->
  <div id="sidebar">

    <h2><span class="dot-indicator" style="background-color:#666"></span> <span data-i18n="formatTitle">Format & Theme</span></h2>
    <div class="toolbar">
      <select id="format-select" data-i18n-title="formatSelect" title="Card aspect ratio">
        <option value="format-auto" data-i18n="formatAuto">Format: Automatic</option>
        <option value="format-story" data-i18n="formatStory">Format: IG Story (9:16)</option>
        <option value="format-post" data-i18n="formatPost">Format: Square Post (1:1)</option>
        <option value="format-post-tall" data-i18n="formatPostTall">Format: Portrait Post (4:5)</option>
      </select>
    </div>
    <div class="toolbar"><button class="full-width" id="theme-toggle" data-i18n="themeToggle">Toggle Light / Dark Mode</button></div>

    <h2 class="section-spacer"><span class="dot-indicator" style="background-color:var(--text-muted)"></span> <span data-i18n="fontTitle">Custom Font</span></h2>
    <div class="toolbar">
      <select id="font-select" data-i18n-title="fontSelect" title="Choose editor font">
        <option value="" data-i18n="fontDefault">NothingCustom (default)</option>
      </select>
    </div>
    <div class="toolbar">
      <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2,.TTF,.OTF" multiple style="display:none">
      <button class="full-width" id="font-upload-btn" data-i18n="loadFonts">Load font files...</button>
    </div>
    <div class="hint" data-i18n="fontFolderHint">
      Or put font files inside a "fonts" folder and list them in fonts/fonts.json
    </div>

    <h2 class="section-spacer"><span class="dot-indicator" style="background-color:var(--accent-red)"></span> <span data-i18n="exportTitle">Export</span></h2>
    <div class="toolbar">
      <select id="quality-select" data-i18n-title="qualitySelect" title="Image resolution">
        <option value="2" data-i18n="qualityStd">Quality: Standard (2x)</option>
        <option value="3" selected data-i18n="qualityHigh">Quality: High (3x)</option>
        <option value="4" data-i18n="qualityUltra">Quality: Ultra (4x)</option>
      </select>
    </div>
    <div class="toolbar">
      <button id="watermark-btn" class="full-width" data-i18n-title="watermarkTitle"
        title="Add a small 'Nothing' tag (links to the editor site)" data-i18n="watermarkOff">Nothing Watermark: Off</button>
    </div>
    <div class="toolbar">
      <button class="full-width" id="export-md-btn" data-i18n-title="exportMdTitle" title="Download note as a .md file" data-i18n="exportMd">Export as Markdown (.md)</button>
    </div>

    <h2 class="section-spacer"><span class="dot-indicator" style="background-color:var(--text-muted)"></span> <span data-i18n="langTitle">Language</span></h2>
    <div class="toolbar">
      <select id="lang-select">
        <option value="auto">Auto</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>

    <h2 class="section-spacer"><span class="dot-indicator" style="background-color:transparent;border:1px solid var(--text-muted)"></span> <span data-i18n="scratchTitle">Scratchpad</span></h2>
    <textarea id="side-notes" data-i18n-ph="scratchPh" placeholder="Write your side notes here..."></textarea>

    <div id="word-counter">0 words · 0 characters</div>
  </div>

  <div id="workspace">
    <div id="export-card" class="card-preview format-auto">
      <div id="main-editor" class="editor-content" contenteditable="true" data-i18n-ph="editorPh" placeholder="Write your text here..."></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
