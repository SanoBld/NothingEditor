        /* --- COLOR VARIABLES --- */
        :root {
            --bg-color: #000000; --sidebar-bg: #0a0a0a; --border-color: #1f1f1f;
            --text-main: #FFFFFF; --text-muted: #666666; --card-bg: #050505;
            --accent-red: #ea1515; --btn-bg: #FFFFFF; --btn-text: #000000;
            --quote-color: #ea1515;
        }
        body.light-mode {
            --bg-color: #F5F5F5; --sidebar-bg: #EAEAEA; --border-color: #D0D0D0;
            --text-main: #000000; --text-muted: #888888; --card-bg: #FFFFFF;
            --btn-bg: #000000; --btn-text: #FFFFFF; 
        }

        /* --- BASE STYLES --- */
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); 
            color: var(--text-main); font-family: 'NothingCustom', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
            transition: background-color 0.3s, color 0.3s; 
        }

        /* --- TOP CONTROLS (Top Left Position) --- */
        .top-controls {
            position: fixed; top: 15px; left: 15px; z-index: 40;
            display: flex; gap: 10px; align-items: center;
        }

        #menu-toggle, #new-btn {
            background-color: var(--card-bg); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 8px;
            width: 40px; height: 40px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 1.2rem;
            transition: background-color 0.2s, border-color 0.2s; outline: none;
            font-family: inherit;
        }
        #menu-toggle:hover, #new-btn:hover { background-color: var(--border-color); }

        /* Restored Red Capture Button */
        #capture-btn {
            background-color: var(--accent-red); color: #FFFFFF;
            border: none; border-radius: 8px; height: 40px; padding: 0 16px;
            font-weight: bold; font-family: inherit; font-size: 0.9rem;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 10px rgba(234, 21, 21, 0.3); outline: none;
        }
        #capture-btn .dot {
            width: 8px; height: 8px; background-color: #FFFFFF;
            border-radius: 50%; display: inline-block;
        }
        #capture-btn:hover:not(:disabled) { transform: scale(1.05); background-color: #d01313; }
        #capture-btn:disabled { opacity: 0.6; cursor: default; transform: none; }
        #capture-btn.loading .dot { animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 340px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); 
            padding: 80px 20px 30px 20px; display: flex; flex-direction: column; 
            box-sizing: border-box; z-index: 20; transition: transform 0.3s ease, margin 0.3s ease; 
            flex-shrink: 0; position: relative; overflow-y: auto;
        }
        #sidebar.collapsed { transform: translateX(-100%); margin-right: -340px; }

        h2 { font-size: 0.8rem; color: var(--text-muted); margin-top: 0; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        h2.section-spacer { margin-top: 22px; }
        .dot-indicator { width: 8px; height: 8px; background-color: var(--accent-red); border-radius: 50%; display: inline-block; flex-shrink: 0; }
        
        .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .toolbar button, .toolbar select { 
            background-color: transparent; color: var(--text-main); border: 1px solid var(--border-color); 
            padding: 8px 12px; cursor: pointer; border-radius: 8px; font-family: inherit; font-size: 0.85rem; 
            transition: all 0.15s; outline: none; 
        }
        .toolbar button:hover, .toolbar select:hover { border-color: var(--text-muted); }
        .toolbar select { flex-grow: 1; }
        .toolbar button.icon-btn { min-width: 38px; height: 38px; padding: 0 10px; display: flex; align-items: center; justify-content: center; }
        .toolbar button.active { background-color: var(--accent-red); border-color: var(--accent-red); color: #FFFFFF; }
        .toolbar button.full-width { width: 100%; }
        
        /* --- COLOR PALETTE --- */
        .color-palette { display: flex; gap: 8px; margin-bottom: 16px; }
        .color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border-color: var(--text-main); }

        #side-notes { flex-grow: 1; min-height: 80px; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; resize: none; outline: none; font-family: inherit; font-size: 0.9rem; line-height: 1.5; }

        #word-counter { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-color); letter-spacing: 1px; text-transform: uppercase; }
        

        /* --- QUICK TOOLBAR (floating bubble) --- */
        #quick-tools {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 35; display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
            justify-content: center; max-width: 92vw;
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }
        #quick-tools .toolbar { margin: 0; gap: 4px; flex-wrap: wrap; justify-content: center; }
        #quick-tools .qsep { width: 1px; height: 26px; background: var(--border-color); margin: 0 4px; }

        /* --- WORKSPACE --- */
        #workspace { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start;
            padding: 150px 40px 120px 40px; box-sizing: border-box; 
            position: relative; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* --- EXPORT CARD --- */
        .card-preview { 
            background-color: var(--card-bg); border: 1px solid var(--border-color); 
            padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            box-sizing: border-box; display: block;
            transition: width 0.3s ease; position: relative; margin: 0 auto;
            /* FIX: card grows with its content */
            height: auto !important;
            min-height: 200px;
            /* FIX: prevent the flex parent (#workspace) from shrinking this below its content */
            flex-shrink: 0;
        }
        
        /* Formats with min-height (ensures baseline size, but expands if text is longer) */
        .format-auto { width: 100%; min-width: 350px; max-width: 600px; min-height: 400px; }
        .format-story { width: 400px; min-height: 711px; }
        .format-post { width: 450px; min-height: 450px; }
        .format-post-tall { width: 450px; min-height: 562px; }

        /* --- TEXT EDITOR --- */
        .editor-content { 
            outline: none; font-size: 1.4rem; line-height: 1.6; 
            letter-spacing: -0.5px; color: var(--text-main); 
            word-wrap: break-word; white-space: pre-wrap; text-align: left; 
            display: block; 
            /* FIX: height auto so editor grows with content */
            height: auto !important;
        }
        
        .editor-content:empty:before { content: attr(placeholder); color: var(--text-muted); pointer-events: none; display: block; }
        .editor-content b, .editor-content strong { font-weight: bold; }
        .editor-content i, .editor-content em { font-style: italic; }
        .editor-content del, .editor-content s, .editor-content strike { text-decoration: line-through; opacity: 0.7; }
        ::selection { background-color: rgba(234, 21, 21, 0.4); color: #fff; }

        /* --- MARKDOWN ELEMENTS --- */
        .editor-content h1 { font-size: 2.1rem; font-weight: bold; line-height: 1.3; margin: 0.3em 0; letter-spacing: -1px; }
        .editor-content h2 { font-size: 1.6rem; font-weight: bold; line-height: 1.3; margin: 0.3em 0; letter-spacing: -0.5px; }
        .editor-content h3 { font-size: 1.25rem; font-weight: bold; line-height: 1.3; margin: 0.3em 0; }
        .editor-content blockquote { 
            border-left: 3px solid var(--quote-color); margin: 0.4em 0; padding: 2px 0 2px 16px; 
            color: var(--text-muted); font-style: italic; 
        }
        .editor-content ul, .editor-content ol { padding-left: 28px; margin: 0.3em 0; }
        .editor-content li { margin-bottom: 0.2em; }
        .editor-content code { 
            background: rgba(128,128,128,0.18); padding: 2px 7px; border-radius: 4px; 
            font-family: 'Courier New', monospace; font-size: 0.85em; letter-spacing: 0;
        }
        .editor-content pre { 
            background: rgba(128,128,128,0.1); border: 1px solid var(--border-color); padding: 14px; 
            border-radius: 10px; overflow-x: auto; font-family: 'Courier New', monospace; 
            font-size: 0.85em; line-height: 1.5; letter-spacing: 0; margin: 0.4em 0; white-space: pre-wrap;
        }
        .editor-content pre code { background: none; padding: 0; }
        .editor-content hr { border: none; border-top: 1px solid var(--border-color); margin: 1.2em 0; }
        .editor-content a { color: var(--accent-red); text-decoration: underline; }

        /* --- NOTHING WATERMARK (added during screenshot export) --- */
        .nothing-watermark {
            display: flex; align-items: center; gap: 8px; margin-top: 28px; 
            padding-top: 16px; border-top: 1px solid var(--border-color);
            font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;
        }
        .nothing-watermark .dot { width: 6px; height: 6px; background-color: var(--accent-red); border-radius: 50%; flex-shrink: 0; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            body { overflow: auto; }
            #sidebar {
                position: fixed; top: 0; left: 0; height: 100vh; width: 85%;
                max-width: 320px; padding-top: 70px; z-index: 50;
                box-shadow: 0 0 30px rgba(0,0,0,0.4);
            }
            #sidebar.collapsed { transform: translateX(-100%); margin-right: 0; }
            #sidebar:not(.collapsed) ~ #workspace::after { content: ''; }
            #quick-tools { top: 62px; left: 8px; right: 8px; transform: none; max-width: none; }
            #workspace { padding: 200px 14px 100px 14px; width: 100%; }
            .card-preview { padding: 22px; border-radius: 16px; }
            .format-auto { min-width: 0; width: 100%; max-width: 100%; min-height: 0; }
            .format-story, .format-post, .format-post-tall { width: 100%; max-width: 420px; }
            .editor-content { font-size: 1.05rem; letter-spacing: -0.3px; }
            .editor-content h1 { font-size: 1.6rem; }
            .editor-content h2 { font-size: 1.3rem; }
            .editor-content h3 { font-size: 1.1rem; }
            #capture-btn { padding: 0 12px; font-size: 0.8rem; }
        }
        @media (max-width: 480px) {
            .top-controls { gap: 6px; }
            #menu-toggle, #new-btn, #capture-btn { height: 36px; }
            #menu-toggle, #new-btn { width: 36px; }
            .card-preview { padding: 16px; }
            .editor-content { font-size: 1rem; }
        }

    </style>
</head>
<body>

    <div class="top-controls">
        <button id="menu-toggle" onclick="toggleSidebar()" data-i18n-title="menu" title="Toggle Sidebar">☰</button>
        <button id="new-btn" onclick="newNote()" data-i18n-title="newNote" title="New note (clear editor)">+</button>
        <button id="capture-btn" onclick="takeScreenshot()" data-i18n-title="capture" title="Capture & Download (PNG)">
            <span class="dot"></span> <span data-i18n="captureLabel">Capture</span>
        </button>
    </div>

    <div id="quick-tools">
        <div class="toolbar">
            <button id="btn-bold" class="icon-btn" onclick="formatText('bold')" data-i18n-title="bold" title="Bold (Ctrl+B)"><b>B</b></button>
            <button id="btn-italic" class="icon-btn" onclick="formatText('italic')" data-i18n-title="italic" title="Italic (Ctrl+I)"><i>I</i></button>
            <button id="btn-underline" class="icon-btn" onclick="applyUnderline()" data-i18n-title="underline" title="Underline (Ctrl+U)"><u>U</u></button>
            <button id="btn-strike" class="icon-btn" onclick="applyStrike()" data-i18n-title="strike" title="Strikethrough (Ctrl+Shift+S)"><s>S</s></button>
            <button id="btn-code" class="icon-btn" onclick="applyInlineCode()" data-i18n-title="code" title="Inline code (Ctrl+E)">&lt;/&gt;</button>
            <button id="btn-highlight" class="icon-btn" onclick="applyHighlight()" data-i18n-title="highlight" title="Highlight selection">
                <mark id="highlight-dot" style="background-color: rgba(234,21,21,0.3); color: inherit; padding: 0 4px; border-radius: 4px;">H</mark>
            </button>
        </div>
        <div class="qsep"></div>
        <div class="toolbar">
            <button id="btn-h1" class="icon-btn" onclick="formatBlockType('h1')" data-i18n-title="h1" title="Heading 1 (Ctrl+Shift+1, or '# ')">H1</button>
            <button id="btn-h2" class="icon-btn" onclick="formatBlockType('h2')" data-i18n-title="h2" title="Heading 2 (Ctrl+Shift+2, or '## ')">H2</button>
            <button id="btn-h3" class="icon-btn" onclick="formatBlockType('h3')" data-i18n-title="h3" title="Heading 3 (Ctrl+Shift+3, or '### ')">H3</button>
            <button id="btn-quote" class="icon-btn" onclick="formatBlockType('blockquote')" data-i18n-title="quote" title="Quote (Ctrl+Shift+9, or '> ')">&ldquo;</button>
            <button id="btn-ul" class="icon-btn" onclick="insertListType('insertUnorderedList')" data-i18n-title="ul" title="Bullet list (Ctrl+Shift+8, or '- ')">&bull; List</button>
            <button id="btn-ol" class="icon-btn" onclick="insertListType('insertOrderedList')" data-i18n-title="ol" title="Numbered list (Ctrl+Shift+7, or '1. ')">1. List</button>
            <button id="btn-pre" class="icon-btn" onclick="formatBlockType('pre')" data-i18n-title="pre" title="Code block (or type '```' + Enter)">{ }</button>
            <button class="icon-btn" onclick="insertDivider()" data-i18n-title="divider" title="Divider (or type '---' + Enter)">&mdash;</button>
        </div>
    </div>

    <div id="sidebar">
        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: var(--text-muted)"></span> <span data-i18n="accentTitle">Accent (Highlight &amp; Underline)</span></h2>
        <div class="color-palette">
            <div class="color-btn active" data-hex="#ea1515" style="background-color: #ea1515;" onclick="setColor(this, '#ea1515', 'rgba(234, 21, 21, 0.3)')"></div>
            <div class="color-btn" data-hex="#eab308" style="background-color: #eab308;" onclick="setColor(this, '#eab308', 'rgba(234, 179, 8, 0.3)')"></div>
            <div class="color-btn" data-hex="#22c55e" style="background-color: #22c55e;" onclick="setColor(this, '#22c55e', 'rgba(34, 197, 94, 0.3)')"></div>
            <div class="color-btn" data-hex="#3b82f6" style="background-color: #3b82f6;" onclick="setColor(this, '#3b82f6', 'rgba(59, 130, 246, 0.3)')"></div>
            <div class="color-btn" data-hex="#d946ef" style="background-color: #d946ef;" onclick="setColor(this, '#d946ef', 'rgba(217, 70, 239, 0.3)')"></div>
        </div>

        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: var(--text-muted)"></span> <span data-i18n="quoteTitle">Quote Bar Color</span></h2>
        <div class="color-palette">
            <div class="color-btn active" data-qhex="#ea1515" style="background-color: #ea1515;" onclick="setQuoteColor(this, '#ea1515')"></div>
            <div class="color-btn" data-qhex="#eab308" style="background-color: #eab308;" onclick="setQuoteColor(this, '#eab308')"></div>
            <div class="color-btn" data-qhex="#22c55e" style="background-color: #22c55e;" onclick="setQuoteColor(this, '#22c55e')"></div>
            <div class="color-btn" data-qhex="#3b82f6" style="background-color: #3b82f6;" onclick="setQuoteColor(this, '#3b82f6')"></div>
            <div class="color-btn" data-qhex="#d946ef" style="background-color: #d946ef;" onclick="setQuoteColor(this, '#d946ef')"></div>
            <div class="color-btn" data-qhex="#FFFFFF" style="background-color: #FFFFFF; border:1px solid var(--border-color);" onclick="setQuoteColor(this, '#FFFFFF')"></div>
        </div>

        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: #666"></span> <span data-i18n="formatTitle">Format &amp; Theme</span></h2>
        <div class="toolbar">
            <select id="format-select" onchange="changeFormat(this.value)" data-i18n-title="formatSelect" title="Card aspect ratio">
                <option value="format-auto" data-i18n="formatAuto">Format: Automatic</option>
                <option value="format-story" data-i18n="formatStory">Format: IG Story (9:16)</option>
                <option value="format-post" data-i18n="formatPost">Format: Square Post (1:1)</option>
                <option value="format-post-tall" data-i18n="formatPostTall">Format: Portrait Post (4:5)</option>
            </select>
        </div>
        <div class="toolbar"><button class="full-width" onclick="toggleTheme()" data-i18n="themeToggle">Toggle Light / Dark Mode</button></div>

        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: var(--text-muted)"></span> <span data-i18n="fontTitle">Custom Font</span></h2>
        <div class="toolbar">
            <select id="font-select" onchange="applyFont(this.value)" data-i18n-title="fontSelect" title="Choose editor font">
                <option value="" data-i18n="fontDefault">NothingCustom (default)</option>
            </select>
        </div>
        <div class="toolbar">
            <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" multiple style="display:none">
            <button class="full-width" onclick="document.getElementById('font-upload').click()" data-i18n="loadFonts">Load font files...</button>
        </div>

        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: var(--accent-red)"></span> <span data-i18n="exportTitle">Export</span></h2>
        <div class="toolbar">
            <select id="quality-select" onchange="setQuality(this.value)" data-i18n-title="qualitySelect" title="Image resolution">
                <option value="2" data-i18n="qualityStd">Quality: Standard (2x)</option>
                <option value="3" selected data-i18n="qualityHigh">Quality: High (3x)</option>
                <option value="4" data-i18n="qualityUltra">Quality: Ultra (4x)</option>
            </select>
        </div>
        <div class="toolbar">
            <button id="watermark-btn" class="full-width" onclick="toggleWatermark()" data-i18n-title="watermarkTitle" title="Add a small 'Nothing' tag to exported images" data-i18n="watermarkOff">Nothing Watermark: Off</button>
        </div>
        <div class="toolbar">
            <button class="full-width" onclick="exportMarkdown()" data-i18n-title="exportMdTitle" title="Download note as a .md file" data-i18n="exportMd">Export as Markdown (.md)</button>
        </div>

        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: var(--text-muted)"></span> <span data-i18n="langTitle">Language</span></h2>
        <div class="toolbar">
            <select id="lang-select" onchange="setLanguage(this.value)">
                <option value="auto">Auto</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>

        <h2 class="section-spacer"><span class="dot-indicator" style="background-color: transparent; border: 1px solid var(--text-muted)"></span> <span data-i18n="scratchTitle">Scratchpad</span></h2>
        <textarea id="side-notes" data-i18n-ph="scratchPh" placeholder="Write your side notes here..."></textarea>

        <div id="word-counter">0 words · 0 characters</div>
    </div>

    <div id="workspace">
        <div id="export-card" class="card-preview format-auto">
            <div id="main-editor" class="editor-content" contenteditable="true" data-i18n-ph="editorPh" placeholder="Write your text here..."></div>
        </div>
    </div>

    <script>
        const mainEditor = document.getElementById('main-editor');
        const exportCard = document.getElementById('export-card');
        const captureBtn = document.getElementById('capture-btn');
        const STORAGE_KEY = 'nothing_editor_state_v1';

        // Store current selected colors / export options
        let activeHexColor = '#ea1515';
        let activeRgbaColor = 'rgba(234, 21, 21, 0.3)';
        let activeQuoteColor = '#ea1515';
        let exportScale = 3;
        let showWatermark = false;
        let autosaveTimer = null;

        // ===== Sidebar =====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // ===== Quote bar color =====
        function setQuoteColor(element, hex) {
            document.documentElement.style.setProperty('--quote-color', hex);
            document.querySelectorAll('[data-qhex]').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            activeQuoteColor = hex;
            scheduleAutosave();
        }

        // ===== Colors =====
        function setColor(element, hex, rgba) {
            activeHexColor = hex;
            activeRgbaColor = rgba;
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            scheduleAutosave();
        }

        // ===== Basic formatting =====
        function formatText(command) { 
            document.execCommand(command, false, null); 
            mainEditor.focus(); 
            updateToolbarState();
        }

        // Toggle: unwrap an existing ancestor tag, or wrap the selection in a new one
        function toggleSurround(tagName, applyStyles) {
            const selection = window.getSelection();
            if (!selection.rangeCount) return false;
            let container = selection.anchorNode;
            if (container && container.nodeType === 3) container = container.parentElement;
            const existing = container && container.closest ? container.closest(tagName) : null;
            if (existing && mainEditor.contains(existing)) {
                const parent = existing.parentNode;
                while (existing.firstChild) parent.insertBefore(existing.firstChild, existing);
                parent.removeChild(existing);
                selection.removeAllRanges();
                updateToolbarState();
                scheduleAutosave();
                return true;
            }
            if (selection.isCollapsed) return false;
            const range = selection.getRangeAt(0);
            const node = document.createElement(tagName);
            applyStyles(node);
            try {
                range.surroundContents(node);
            } catch(e) { return false; }
            selection.removeAllRanges();
            updateToolbarState();
            scheduleAutosave();
            return true;
        }

        function applyHighlight() {
            toggleSurround('mark', (markNode) => {
                markNode.style.backgroundColor = activeRgbaColor;
                markNode.style.color = "inherit";
                markNode.style.borderRadius = "4px";
                markNode.style.padding = "2px 6px";
            });
        }

        function applyUnderline() {
            toggleSurround('u', (uNode) => {
                uNode.style.textDecoration = "none";
                uNode.style.borderBottom = "2px solid " + activeHexColor;
                uNode.style.paddingBottom = "1px";
            });
        }

        function applyStrike() {
            document.execCommand('strikeThrough', false, null);
            mainEditor.focus();
            updateToolbarState();
            scheduleAutosave();
        }

        function applyInlineCode() {
            toggleSurround('code', () => {});
            mainEditor.focus();
        }

        // ===== Structure (Markdown-style blocks) =====
        function getCurrentBlock() {
            let block = '';
            try { block = (document.queryCommandValue('formatBlock') || '').toLowerCase().replace(/[<>]/g, ''); } catch(e) {}
            return block;
        }

        function formatBlockType(tag) {
            mainEditor.focus();
            const current = getCurrentBlock();
            if (current === tag) {
                document.execCommand('formatBlock', false, '<div>');
            } else {
                document.execCommand('formatBlock', false, '<' + tag + '>');
            }
            updateToolbarState();
            scheduleAutosave();
        }

        function insertListType(cmd) {
            mainEditor.focus();
            document.execCommand(cmd, false, null);
            updateToolbarState();
            scheduleAutosave();
        }

        function insertDivider() {
            mainEditor.focus();
            document.execCommand('insertHorizontalRule', false, null);
            scheduleAutosave();
        }

        // ===== Toolbar active-state sync =====
        function setActive(id, on) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('active', !!on);
        }

        function updateToolbarState() {
            const sel = window.getSelection();
            if (!sel.rangeCount || !mainEditor.contains(sel.anchorNode)) {
                document.querySelectorAll('#quick-tools .toolbar button.active').forEach(b => b.classList.remove('active'));
                return;
            }
            try {
                setActive('btn-bold', document.queryCommandState('bold'));
                setActive('btn-italic', document.queryCommandState('italic'));
                setActive('btn-strike', document.queryCommandState('strikeThrough'));
            } catch(e) {}

            let anchor = sel.anchorNode;
            if (anchor && anchor.nodeType === 3) anchor = anchor.parentElement;
            setActive('btn-underline', !!(anchor && anchor.closest('u')));
            setActive('btn-code', !!(anchor && anchor.closest('code')));
            setActive('btn-highlight', !!(anchor && anchor.closest('mark')));

            const block = getCurrentBlock();
            setActive('btn-h1', block === 'h1');
            setActive('btn-h2', block === 'h2');
            setActive('btn-h3', block === 'h3');
            setActive('btn-quote', block === 'blockquote');
            setActive('btn-pre', block === 'pre');
        }
        document.addEventListener('selectionchange', updateToolbarState);

        // ===== Markdown shortcuts (typed) =====
        function deleteTextBefore(node, offset) {
            const range = document.createRange();
            range.setStart(node, 0);
            range.setEnd(node, offset);
            range.deleteContents();
        }

        mainEditor.addEventListener('keydown', function(e) {
            // Keyboard shortcuts
            if ((e.ctrlKey || e.metaKey) && e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 's': e.preventDefault(); applyStrike(); return;
                    case '1': e.preventDefault(); formatBlockType('h1'); return;
                    case '2': e.preventDefault(); formatBlockType('h2'); return;
                    case '3': e.preventDefault(); formatBlockType('h3'); return;
                    case '7': case '&': e.preventDefault(); insertListType('insertOrderedList'); return;
                    case '8': case '*': e.preventDefault(); insertListType('insertUnorderedList'); return;
                    case '9': case '(': e.preventDefault(); formatBlockType('blockquote'); return;
                }
            }
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'e') {
                e.preventDefault(); applyInlineCode(); return;
            }

            // Markdown auto-formatting on space / enter
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const node = sel.focusNode;
            if (!node || node.nodeType !== 3) return;
            const offset = sel.focusOffset;
            const text = node.textContent.slice(0, offset);

            if (e.key === ' ') {
                const headingMap = { '#': '<h1>', '##': '<h2>', '###': '<h3>', '>': '<blockquote>' };
                if (headingMap[text]) {
                    e.preventDefault();
                    deleteTextBefore(node, offset);
                    document.execCommand('formatBlock', false, headingMap[text]);
                    updateToolbarState();
                    return;
                }
                if (text === '-' || text === '*') {
                    e.preventDefault();
                    deleteTextBefore(node, offset);
                    document.execCommand('insertUnorderedList');
                    updateToolbarState();
                    return;
                }
                if (text === '1.') {
                    e.preventDefault();
                    deleteTextBefore(node, offset);
                    document.execCommand('insertOrderedList');
                    updateToolbarState();
                    return;
                }
            }

            if (e.key === 'Enter') {
                const trimmed = node.textContent.trim();
                if (trimmed === '---' || trimmed === '***' || trimmed === '___') {
                    e.preventDefault();
                    node.textContent = '';
                    document.execCommand('insertHorizontalRule');
                    return;
                }
                if (trimmed === '```') {
                    e.preventDefault();
                    node.textContent = '';
                    document.execCommand('formatBlock', false, '<pre>');
                    return;
                }
            }
        });

        // ===== Inline markdown auto-formatting (bold/italic/strike/code) =====
        function handleInlineMarkdown() {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const node = sel.focusNode;
            if (!node || node.nodeType !== 3) return;
            const offset = sel.focusOffset;
            const text = node.textContent.slice(0, offset);

            const patterns = [
                { regex: /\*\*([^*]+?)\*\*$/, tag: 'strong' },
                { regex: /~~([^~]+?)~~$/, tag: 'del' },
                { regex: /`([^`]+?)`$/, tag: 'code' },
                { regex: /(?<!\*)\*([^*\s][^*]*?)\*$/, tag: 'em' }
            ];

            for (const p of patterns) {
                const m = text.match(p.regex);
                if (m) {
                    const matchStart = offset - m[0].length;
                    const range = document.createRange();
                    range.setStart(node, matchStart);
                    range.setEnd(node, offset);
                    range.deleteContents();
                    const el = document.createElement(p.tag);
                    el.textContent = m[1];
                    range.insertNode(el);
                    const space = document.createTextNode('\u00A0');
                    el.parentNode.insertBefore(space, el.nextSibling);
                    const newRange = document.createRange();
                    newRange.setStart(space, 1);
                    newRange.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                    return;
                }
            }
        }

        // ===== Format / theme =====
        function changeFormat(formatClass) { 
            exportCard.className = 'card-preview ' + formatClass; 
            scheduleAutosave();
        }
        
        function toggleTheme() { 
            document.body.classList.toggle('light-mode'); 
            scheduleAutosave();
        }

        // ===== Export options =====
        function setQuality(val) {
            exportScale = parseInt(val, 10) || 3;
            scheduleAutosave();
        }

        function toggleWatermark() {
            showWatermark = !showWatermark;
            updateWatermarkButton();
            scheduleAutosave();
        }

        function updateWatermarkButton() {
            const btn = document.getElementById('watermark-btn');
            const dict = I18N[resolveLang(currentLang)];
            btn.textContent = showWatermark ? dict.watermarkOn : dict.watermarkOff;
            btn.classList.toggle('active', showWatermark);
        }

        // ===== Screenshot export =====
        function takeScreenshot() {
            const workspace = document.getElementById('workspace');
            const card = exportCard;
            const isLight = document.body.classList.contains('light-mode');

            captureBtn.disabled = true;
            captureBtn.classList.add('loading');
            const originalLabel = captureBtn.innerHTML;
            captureBtn.innerHTML = '<span class="dot"></span> Capturing...';

            const originalScroll = workspace.scrollTop;
            const originalBorder = card.style.border;
            if (!isLight) card.style.border = "1px solid #222";

            let watermarkEl = null;
            if (showWatermark) {
                watermarkEl = document.createElement('div');
                watermarkEl.className = 'nothing-watermark';
                watermarkEl.innerHTML = '<span class="dot"></span> Nothing Editor';
                card.appendChild(watermarkEl);
            }

            document.body.style.overflow = 'visible';
            workspace.style.overflow = 'visible';
            workspace.style.height = 'auto';

            function cleanup() {
                card.style.border = originalBorder;
                if (watermarkEl && watermarkEl.parentNode) card.removeChild(watermarkEl);
                document.body.style.overflow = 'hidden';
                workspace.style.overflow = 'auto';
                workspace.style.height = '';
                workspace.scrollTop = originalScroll;
                captureBtn.disabled = false;
                captureBtn.classList.remove('loading');
                captureBtn.innerHTML = originalLabel;
            }

            // Small delay so the watermark is laid out before capture
            setTimeout(() => {
                html2canvas(card, { 
                    backgroundColor: isLight ? '#FFFFFF' : '#050505', 
                    scale: exportScale,
                    useCORS: true, 
                    logging: false,
                    windowWidth: document.documentElement.scrollWidth,
                    windowHeight: document.documentElement.scrollHeight
                }).then(canvas => {
                    cleanup();
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL("image/png");
                    const now = new Date();
                    const stamp = now.getFullYear() + '-' +
                        String(now.getMonth() + 1).padStart(2, '0') + '-' +
                        String(now.getDate()).padStart(2, '0') + '_' +
                        String(now.getHours()).padStart(2, '0') +
                        String(now.getMinutes()).padStart(2, '0');
                    link.download = 'Nothing_Note_' + stamp + '.png';
                    link.click();
                }).catch(() => { cleanup(); });
            }, 50);
        }

        // ===== Markdown export =====
        function htmlToMarkdown(node) {
            let md = '';
            for (const child of node.childNodes) {
                if (child.nodeType === 3) { md += child.textContent; continue; }
                if (child.nodeType !== 1) continue;
                const tag = child.tagName.toLowerCase();
                switch (tag) {
                    case 'h1': md += '# ' + htmlToMarkdown(child).trim() + '\n\n'; break;
                    case 'h2': md += '## ' + htmlToMarkdown(child).trim() + '\n\n'; break;
                    case 'h3': md += '### ' + htmlToMarkdown(child).trim() + '\n\n'; break;
                    case 'strong': case 'b': md += '**' + htmlToMarkdown(child) + '**'; break;
                    case 'em': case 'i': md += '*' + htmlToMarkdown(child) + '*'; break;
                    case 'u': md += '<u>' + htmlToMarkdown(child) + '</u>'; break;
                    case 'del': case 's': case 'strike': md += '~~' + htmlToMarkdown(child) + '~~'; break;
                    case 'mark': md += '==' + htmlToMarkdown(child) + '=='; break;
                    case 'code': md += '`' + child.textContent + '`'; break;
                    case 'pre': md += '```\n' + child.textContent + '\n```\n\n'; break;
                    case 'blockquote': md += '> ' + htmlToMarkdown(child).trim().replace(/\n+/g, '\n> ') + '\n\n'; break;
                    case 'ul':
                        for (const li of child.children) md += '- ' + htmlToMarkdown(li).trim() + '\n';
                        md += '\n';
                        break;
                    case 'ol': {
                        let i = 1;
                        for (const li of child.children) { md += i + '. ' + htmlToMarkdown(li).trim() + '\n'; i++; }
                        md += '\n';
                        break;
                    }
                    case 'hr': md += '\n---\n\n'; break;
                    case 'br': md += '\n'; break;
                    case 'a': md += '[' + htmlToMarkdown(child) + '](' + (child.getAttribute('href') || '') + ')'; break;
                    case 'div': case 'p': md += htmlToMarkdown(child) + '\n\n'; break;
                    default: md += htmlToMarkdown(child);
                }
            }
            return md;
        }

        function exportMarkdown() {
            const md = htmlToMarkdown(mainEditor).trim() + '\n';
            const blob = new Blob([md], { type: 'text/markdown' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Nothing_Note_' + Date.now() + '.md';
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ===== New note =====
        function newNote() {
            if (mainEditor.innerText.trim().length && !confirm('Clear the current note? This cannot be undone.')) return;
            mainEditor.innerHTML = '';
            updateWordCount();
            scheduleAutosave();
            mainEditor.focus();
        }

        // ===== Word / character count =====
        function updateWordCount() {
            const text = mainEditor.innerText || '';
            const trimmed = text.trim();
            const words = trimmed.length ? trimmed.split(/\s+/).length : 0;
            document.getElementById('word-counter').textContent = words + ' words · ' + text.length + ' characters';
        }

        // ===== Autosave (localStorage) =====
        function scheduleAutosave() {
            clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(saveState, 400);
        }

        function saveState() {
            const state = {
                content: mainEditor.innerHTML,
                notes: document.getElementById('side-notes').value,
                theme: document.body.classList.contains('light-mode') ? 'light' : 'dark',
                format: exportCard.className.replace('card-preview', '').trim(),
                watermark: showWatermark,
                scale: exportScale,
                color: activeHexColor,
                rgba: activeRgbaColor,
                quoteColor: activeQuoteColor,
                lang: currentLang
            };
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
        }

        function loadState() {
            let state = null;
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) state = JSON.parse(raw);
            } catch(e) { state = null; }
            if (!state) { setLanguage('auto'); updateWordCount(); return; }

            if (state.content) mainEditor.innerHTML = state.content;
            if (state.notes) document.getElementById('side-notes').value = state.notes;
            if (state.theme === 'light') document.body.classList.add('light-mode');
            if (state.format) {
                exportCard.className = 'card-preview ' + state.format;
                const sel = document.getElementById('format-select');
                if (sel) sel.value = state.format;
            }
            if (typeof state.watermark === 'boolean') {
                showWatermark = state.watermark;
                updateWatermarkButton();
            }
            if (state.scale) {
                exportScale = state.scale;
                const sel = document.getElementById('quality-select');
                if (sel) sel.value = String(state.scale);
            }
            if (state.color) {
                activeHexColor = state.color;
                activeRgbaColor = state.rgba || activeRgbaColor;
                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-hex') === state.color);
                });
            }
            if (state.quoteColor) {
                activeQuoteColor = state.quoteColor;
                document.documentElement.style.setProperty('--quote-color', state.quoteColor);
                document.querySelectorAll('[data-qhex]').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-qhex') === state.quoteColor);
                });
            }
            setLanguage(state.lang || 'auto');
            updateWordCount();
        }

        // ===== Input wiring =====
        mainEditor.addEventListener('input', function() {
            handleInlineMarkdown();
            updateWordCount();
            scheduleAutosave();
        });

        document.getElementById('side-notes').addEventListener('input', scheduleAutosave);

        // Clean paste handler to prevent copying unwanted external HTML styles
        mainEditor.addEventListener('paste', function(e) {
            e.preventDefault();
            let text = e.clipboardData.getData('text/plain');
            // Convert basic markdown emphasis to HTML so pasted bold text stays bold
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__([^_]+?)__/g, '<strong>$1</strong>')
                .replace(/(?<!\*)\*([^*\s][^*]*?)\*(?!\*)/g, '<em>$1</em>')
                .replace(/~~([^~]+?)~~/g, '<del>$1</del>')
                .replace(/\n/g, '<br>');
            document.execCommand('insertHTML', false, html);
        });

        // ===== Custom font loader =====
        let activeFontName = '';
        document.getElementById('font-upload').addEventListener('change', async function(e) {
            for (const file of e.target.files) {
                try {
                    const buf = await file.arrayBuffer();
                    const name = file.name.replace(/\.[^.]+$/, '');
                    const ff = new FontFace(name, buf);
                    await ff.load();
                    document.fonts.add(ff);
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    const sel = document.getElementById('font-select');
                    sel.appendChild(opt);
                    sel.value = name;
                    applyFont(name);
                } catch(err) {}
            }
            e.target.value = '';
        });

        function applyFont(name) {
            activeFontName = name;
            mainEditor.style.fontFamily = name ? ("'" + name + "', 'NothingCustom', sans-serif") : '';
            scheduleAutosave();
        }

        // ===== Language / i18n =====
        const I18N = {
            en: {
                menu: 'Toggle Sidebar', newNote: 'New note (clear editor)', capture: 'Capture & Download (PNG)', captureLabel: 'Capture',
                bold: 'Bold (Ctrl+B)', italic: 'Italic (Ctrl+I)', underline: 'Underline (Ctrl+U)', strike: 'Strikethrough (Ctrl+Shift+S)',
                code: 'Inline code (Ctrl+E)', highlight: 'Highlight selection',
                h1: 'Heading 1 (Ctrl+Shift+1, or \'# \')', h2: 'Heading 2 (Ctrl+Shift+2, or \'## \')', h3: 'Heading 3 (Ctrl+Shift+3, or \'### \')',
                quote: 'Quote (Ctrl+Shift+9, or \'> \')', ul: 'Bullet list (Ctrl+Shift+8, or \'- \')', ol: 'Numbered list (Ctrl+Shift+7, or \'1. \')',
                pre: 'Code block (or type \'```\' + Enter)', divider: 'Divider (or type \'---\' + Enter)',
                accentTitle: 'Accent (Highlight & Underline)', quoteTitle: 'Quote Bar Color', formatTitle: 'Format & Theme',
                fontTitle: 'Custom Font', fontDefault: 'NothingCustom (default)', loadFonts: 'Load font files...', fontSelect: 'Choose editor font',
                exportTitle: 'Export', themeToggle: 'Toggle Light / Dark Mode', formatSelect: 'Card aspect ratio',
                formatAuto: 'Format: Automatic', formatStory: 'Format: IG Story (9:16)', formatPost: 'Format: Square Post (1:1)', formatPostTall: 'Format: Portrait Post (4:5)',
                qualitySelect: 'Image resolution', qualityStd: 'Quality: Standard (2x)', qualityHigh: 'Quality: High (3x)', qualityUltra: 'Quality: Ultra (4x)',
                watermarkTitle: "Add a small 'Nothing' tag to exported images", watermarkOff: 'Nothing Watermark: Off', watermarkOn: 'Nothing Watermark: On',
                exportMdTitle: 'Download note as a .md file', exportMd: 'Export as Markdown (.md)',
                langTitle: 'Language', scratchTitle: 'Scratchpad', scratchPh: 'Write your side notes here...', editorPh: 'Write your text here...'
            },
            fr: {
                menu: 'Afficher / masquer le menu', newNote: 'Nouvelle note (efface le texte)', capture: 'Capturer et télécharger (PNG)', captureLabel: 'Capturer',
                bold: 'Gras (Ctrl+B)', italic: 'Italique (Ctrl+I)', underline: 'Souligné (Ctrl+U)', strike: 'Barré (Ctrl+Shift+S)',
                code: 'Code en ligne (Ctrl+E)', highlight: 'Surligner la sélection',
                h1: 'Titre 1 (Ctrl+Shift+1, ou \'# \')', h2: 'Titre 2 (Ctrl+Shift+2, ou \'## \')', h3: 'Titre 3 (Ctrl+Shift+3, ou \'### \')',
                quote: 'Citation (Ctrl+Shift+9, ou \'> \')', ul: 'Liste à puces (Ctrl+Shift+8, ou \'- \')', ol: 'Liste numérotée (Ctrl+Shift+7, ou \'1. \')',
                pre: 'Bloc de code (ou tapez \'```\' + Entrée)', divider: 'Séparateur (ou tapez \'---\' + Entrée)',
                accentTitle: 'Accent (surlignage & soulignement)', quoteTitle: 'Couleur de la citation', formatTitle: 'Format & thème',
                fontTitle: 'Police personnalisée', fontDefault: 'NothingCustom (défaut)', loadFonts: 'Charger des polices...', fontSelect: 'Choisir la police de l\'éditeur',
                exportTitle: 'Exporter', themeToggle: 'Basculer clair / sombre', formatSelect: 'Format de la carte',
                formatAuto: 'Format : automatique', formatStory: 'Format : Story IG (9:16)', formatPost: 'Format : post carré (1:1)', formatPostTall: 'Format : post portrait (4:5)',
                qualitySelect: 'Résolution de l\'image', qualityStd: 'Qualité : standard (2x)', qualityHigh: 'Qualité : haute (3x)', qualityUltra: 'Qualité : ultra (4x)',
                watermarkTitle: "Ajoute un petit logo 'Nothing' sur l'image exportée", watermarkOff: 'Filigrane Nothing : désactivé', watermarkOn: 'Filigrane Nothing : activé',
                exportMdTitle: 'Télécharger la note en .md', exportMd: 'Exporter en Markdown (.md)',
                langTitle: 'Langue', scratchTitle: 'Brouillon', scratchPh: 'Écrivez vos notes ici...', editorPh: 'Écrivez votre texte ici...'
            }
        };

        let currentLang = 'auto';
        function resolveLang(lang) {
            if (lang === 'auto') return (navigator.language || 'en').toLowerCase().startsWith('fr') ? 'fr' : 'en';
            return lang;
        }

        function setLanguage(lang) {
            currentLang = lang;
            const dict = I18N[resolveLang(lang)];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                if (dict[key]) el.title = dict[key];
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (dict[key]) el.setAttribute('placeholder', dict[key]);
            });
            updateWatermarkButton();
            const sel = document.getElementById('lang-select');
            if (sel) sel.value = lang;
            scheduleAutosave();
        }

        // ===== Init =====
        loadState();
    </script>
